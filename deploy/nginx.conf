# =============================================================================
# Nginx config — Mental Gaming Store Mini App
# -----------------------------------------------------------------------------
# ဒီ file ကို VPS မှာ /etc/nginx/sites-available/mgs အဖြစ် copy ကူးပါ:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/mgs
#   sudo ln -s /etc/nginx/sites-available/mgs /etc/nginx/sites-enabled/mgs
#   sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️ အောက်က YOUR_DOMAIN နေရာမှာ ကိုယ့် domain (ဥပမာ store.example.com) ထည့်ပါ။
# HTTPS (SSL) block ကို certbot က အလိုအလျောက် ဖြည့်ပေးပါလိမ့်မယ်:
#   sudo certbot --nginx -d YOUR_DOMAIN
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Mini app frontend (React static build)
    root /var/www/mgs/landing;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API server — /api/* ကို Express server (port 8000) ဆီ proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # SPA fallback — route အားလုံးကို index.html ဆီ
    location / {
        try_files $uri $uri/ /index.html;
    }

    # static asset caching
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
